<app-feedback />
<section class="auth-panel">
  <h1>Complete Password Reset</h1>
  <form class="auth-form" (submit)="submit($event)">
    <label>
      <span>Reset token</span>
      <input id="token" type="text" [formField]="resetForm.token" />
    </label>

    <label>
      <span>New password</span>
      <input id="new-password" type="password" [formField]="resetForm.password" />
    </label>

    <label>
      <span>Confirm password</span>
      <input id="confirm-password" type="password" [formField]="resetForm.confirmPassword" />
    </label>

    <div class="actions">
      <button matButton="filled" type="submit" [disabled]="!enableSubmit()">Save password</button>
      <a matButton routerLink="/auth/login">Back to login</a>
    </div>
  </form>
</section>
