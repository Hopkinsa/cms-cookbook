<app-feedback />
<section class="auth-panel">
  <h1>Password Reset</h1>
  <form class="auth-form" (submit)="submit($event)">
    <label>
      <span>Username or Email</span>
      <input id="reset-login" type="text" [formField]="requestForm.login" />
    </label>

    <div class="actions">
      <button matButton="filled" type="submit" [disabled]="!enableSubmit()">Request reset</button>
      <a matButton routerLink="/auth/password-reset/complete">Complete reset</a>
    </div>
  </form>

  @if (issuedResetToken()) {
    <div class="token-box">
      <p>Development reset token:</p>
      <code>{{ issuedResetToken() }}</code>
    </div>
  }
</section>
