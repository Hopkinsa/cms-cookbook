 @if(authService.isAuthenticated()) {
    <button aria-label="Administrator menu" matIconButton type="button" [matMenuTriggerFor]="menu">
    <mat-icon>more_vert</mat-icon>
</button>
 }
<mat-menu #menu="matMenu">
    @for (link of links; track i; let i = $index) {
    @if (showLink(link)) {
    <button mat-menu-item type="button" (click)="nav(i)">
        {{ link.label }}
    </button>
    }
    }
</mat-menu>

<button class="lock" matIconButton type="button" (click)="authAction()">
    @if(authService.isAuthenticated()) {
    <mat-icon>lock_open</mat-icon>
    }
    @else {
    <mat-icon>lock</mat-icon>
    }
</button>
