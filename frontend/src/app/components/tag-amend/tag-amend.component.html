<form>
  <input type="hidden" [formField]="$any(tagForm.id)">
  <label><b>Type:</b> <select [formField]="tagForm.type">
    <option value="">Select a tag type</option>
    <option value="category">Category</option>
    <option value="cuisine">Cuisine</option>
  </select></label>
  <label><b>Tag:</b> <input type="text" [formField]="tagForm.tag"></label>
  <button matIconButton type="button" [disabled]="!enableSave()" (click)="save($event)"><mat-icon fontSet="material-icons-outlined">check_circle</mat-icon></button>
</form>
